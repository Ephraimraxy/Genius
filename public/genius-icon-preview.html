<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Icon Comparison — GMIJP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 20px;
    }
    h1 {
      font-size: 22px;
      font-weight: 900;
      color: #0f172a;
      letter-spacing: -0.5px;
    }
    .row {
      display: flex;
      gap: 48px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #64748b;
    }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
      background: #f59e0b;
      color: #fff;
    }
    .badge.current { background: #94a3b8; }

    /* Sizes */
    .sz-512 { width: 180px; height: 180px; }
    .sz-192 { width: 96px; height: 96px; }
    .sz-48  { width: 48px; height: 48px; border-radius: 10px; overflow: hidden; }

    img { width: 100%; height: 100%; object-fit: contain; border-radius: inherit; }

    /* Android launcher simulation */
    .android-shelf {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-radius: 24px;
      padding: 32px 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 140px;
    }
    .android-icon { border-radius: 22px; overflow: hidden; }
    .app-name {
      color: #fff;
      font-size: 11px;
      font-weight: 600;
    }

    /* Favicon bar simulation */
    .browser-bar {
      background: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      width: 280px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border: 1px solid #e2e8f0;
    }
    .favicon { width: 16px; height: 16px; border-radius: 2px; overflow: hidden; }
    .url-text { font-size: 12px; color: #475569; font-weight: 500; flex: 1; }

    hr { width: 100%; border: none; border-top: 1.5px solid #e2e8f0; max-width: 600px; }
  </style>
</head>
<body>

  <h1>GMIJP App Icon Comparison</h1>

  <!-- ─── EXISTING ICONS ─────────────────── -->
  <div class="card">
    <span class="label">Current Icons in Use</span>
    <div class="row">
      <div class="card">
        <span class="badge current">gmijp-logo.png (favicon)</span>
        <div class="sz-512" style="border-radius:24px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.15)">
          <img src="/gmijp-logo.png" />
        </div>
        <div class="browser-bar">
          <div class="favicon"><img src="/gmijp-logo.png" /></div>
          <span class="url-text">gmijp.com — Genius Journal</span>
        </div>
      </div>
      <div class="card">
        <span class="badge current">pwa-icon.png (Android/PWA)</span>
        <div class="sz-512" style="background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.15)">
          <img src="/pwa-icon.png" style="padding:16px" />
        </div>
        <div class="android-shelf">
          <div class="android-icon sz-192" style="width:72px;height:72px;background:#fff">
            <img src="/pwa-icon.png" />
          </div>
          <span class="app-name">Genius</span>
        </div>
      </div>
    </div>
  </div>

  <hr />

  <!-- ─── NEW ICON ─────────────────────── -->
  <div class="card">
    <span class="label">New Proposed Icon</span>
    <span class="badge">genius-icon-new.svg</span>

    <div class="row">
      <!-- Large 512 preview -->
      <div class="card">
        <div class="sz-512" style="border-radius:24px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.2)">
          <img src="/genius-icon-new.svg" />
        </div>
        <span style="font-size:11px;color:#94a3b8;font-weight:600">512 × 512</span>
      </div>

      <!-- Android launcher sim -->
      <div class="card">
        <div class="android-shelf">
          <div class="android-icon" style="width:72px;height:72px;border-radius:18px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.4)">
            <img src="/genius-icon-new.svg" />
          </div>
          <span class="app-name">Genius</span>
        </div>
        <span style="font-size:11px;color:#94a3b8;font-weight:600">Android Launcher</span>
      </div>

      <!-- Favicon sim -->
      <div class="card">
        <div class="browser-bar">
          <div class="favicon"><img src="/genius-icon-new.svg" /></div>
          <span class="url-text">gmijp.com — Genius Journal</span>
        </div>
        <div class="sz-48">
          <img src="/genius-icon-new.svg" />
        </div>
        <span style="font-size:11px;color:#94a3b8;font-weight:600">Favicon / Tab</span>
      </div>
    </div>
  </div>

</body>
</html>
